<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keyrisk Email Signature Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#21243D; --navy-wm:#22294B; --gold:#EFC52E; --gold-dim:#d4a820;
    --white:#fff; --grey-text:#8a8faa; --bg:#0e1129; --surface:#161a36;
    --surface-hover:#1c2148; --input-bg:#1e2350; --input-border:#2d3366; --label:#8a8faa;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(239,197,46,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(239,197,46,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .app{position:relative;z-index:1;max-width:1320px;margin:0 auto;padding:40px 30px}
  .header{text-align:center;margin-bottom:48px}
  .header-logo{display:inline-flex;align-items:center;gap:14px;margin-bottom:12px}
  .header-logo img{height:36px;display:block}
  .header h1{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:300;color:var(--grey-text);letter-spacing:2px}
  .header p{margin-top:8px;font-size:14px;color:var(--grey-text);opacity:.7}
  .layout{display:grid;grid-template-columns:400px 1fr;gap:40px;align-items:start}
  .form-panel{background:var(--surface);border:1px solid var(--input-border);border-radius:16px;padding:32px;position:sticky;top:20px;max-height:calc(100vh - 40px);overflow-y:auto}
  .form-panel h2{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;padding-bottom:10px;border-bottom:1px solid var(--input-border)}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:11px;font-weight:500;color:var(--label);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
  .field input,.field select{width:100%;padding:9px 12px;background:var(--input-bg);border:1px solid var(--input-border);border-radius:8px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s,box-shadow .2s}
  .field input:focus,.field select:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(239,197,46,.15)}
  .field input::placeholder{color:var(--grey-text);opacity:.5}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .mbox-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-bottom:14px}
  .mbox-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;transition:background .15s;user-select:none}
  .mbox-item:hover{background:var(--input-bg)}
  .mbox-item input[type="checkbox"]{width:16px;height:16px;accent-color:var(--gold);cursor:pointer;flex-shrink:0}
  .mbox-item .mbox-label{font-size:12px;font-weight:500;color:var(--white);line-height:1.2}
  .mbox-item .mbox-email{font-size:10px;color:var(--grey-text);line-height:1.2;display:block}
  .preset-row{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
  .preset-btn{padding:6px 12px;background:var(--input-bg);color:var(--grey-text);border:1px solid var(--input-border);border-radius:6px;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
  .preset-btn:hover{border-color:var(--gold);color:var(--white)}
  .preset-btn.active-preset{background:rgba(239,197,46,.12);border-color:var(--gold);color:var(--gold)}
  .heading-toggle{display:flex;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--input-border);margin-bottom:14px}
  .heading-btn{flex:1;padding:8px 6px;background:var(--input-bg);color:var(--grey-text);border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center}
  .heading-btn.active{background:var(--gold);color:var(--navy);font-weight:700}
  .heading-btn:not(.active):hover{background:var(--surface-hover)}
  .checkbox-field{display:flex;align-items:center;gap:10px;margin-bottom:14px;cursor:pointer}
  .checkbox-field input[type="checkbox"]{width:18px;height:18px;accent-color:var(--gold);cursor:pointer}
  .checkbox-field span{font-size:13px;color:var(--label)}
  .section-divider{height:1px;background:var(--input-border);margin:20px 0}
  .preview-panel{background:var(--surface);border:1px solid var(--input-border);border-radius:16px;overflow:hidden}
  .preview-header{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;border-bottom:1px solid var(--input-border)}
  .preview-header h2{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:600;color:var(--gold);letter-spacing:3px;text-transform:uppercase}
  .btn-group{display:flex;gap:10px}
  .btn{padding:8px 16px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{background:var(--gold);color:var(--navy)}
  .btn-primary:hover{background:var(--gold-dim);transform:translateY(-1px)}
  .btn-secondary{background:var(--input-bg);color:var(--white);border:1px solid var(--input-border)}
  .btn-secondary:hover{background:var(--surface-hover);border-color:var(--gold)}
  .preview-body{padding:28px;background:#f5f5f5;min-height:260px;display:flex;align-items:flex-start;justify-content:center}
  .toast{position:fixed;bottom:30px;right:30px;background:var(--navy);border:1px solid var(--gold);color:var(--white);padding:14px 24px;border-radius:10px;font-size:14px;font-weight:500;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:1000;animation:slideIn .3s ease,slideOut .3s ease 2.2s forwards;display:flex;align-items:center;gap:8px}
  .toast .icon{color:var(--gold);font-size:18px}
  @keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  @keyframes slideOut{from{transform:translateY(0);opacity:1}to{transform:translateY(20px);opacity:0}}
  .instructions{margin-top:40px;background:var(--surface);border:1px solid var(--input-border);border-radius:16px;padding:24px 28px}
  .instructions h3{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:600;color:var(--gold);letter-spacing:3px;text-transform:uppercase;margin-bottom:14px}
  .instructions ol{padding-left:20px;color:var(--grey-text);font-size:13px;line-height:2}
  .instructions code{background:var(--input-bg);padding:2px 7px;border-radius:4px;font-size:12px;color:var(--gold);font-family:'DM Sans',sans-serif}
  @media(max-width:900px){.layout{grid-template-columns:1fr}.form-panel{position:static;max-height:none}.preview-body{overflow-x:auto}}
</style>
</head>

  standard: ['claims','underwriting','premiums','otherEnquiries'],

let state = {
  firstName:'', lastName:'', title:'', phone1:'', phone2:'',
  email:'', region:'',
  sectionHeading: 'dedicated',
  selectedMailboxes: ['claims','underwriting','premiums','otherEnquiries'],
  includeFAIS: false, faisRole:'',
  includeNote: true,
};

function getEmailPrefix() {
  if (state.email) return state.email;
  if (state.firstName && state.lastName)
    return state.firstName.charAt(0).toLowerCase() + state.lastName.toLowerCase().replace(/\s+/g,'') + '@keyrisk.co.za';
  return '';
}
function getActiveMailboxes() {
  return state.selectedMailboxes.map(id => ALL_MAILBOXES.find(m => m.id === id)).filter(Boolean);
}
function getSectionTitle() { return state.sectionHeading === 'service' ? 'Service Links' : 'Dedicated Mailboxes'; }
function getActivePreset() {
  for (const [name, ids] of Object.entries(PRESETS)) {
    if (ids.length === state.selectedMailboxes.length && ids.every(id => state.selectedMailboxes.includes(id))) return name;
  }
  return null;
}

function generateSignatureHTML() {
  const fn = state.firstName || 'FIRST';
  const ln = state.lastName || 'LAST';
  const title = state.title || 'Job Title';
  const p1 = state.phone1 || '+27 XX XXX XXXX';
  const em = getEmailPrefix() || 'email@keyrisk.co.za';
  const mboxes = getActiveMailboxes();
  const secTitle = getSectionTitle();
  const regionLine = state.region ? `<br>${state.region}` : '';

  let phoneRows;
  if (state.phone2) {
    phoneRows = `<tr><td style="padding:0 6px 2px 0;vertical-align:top;font-size:11px;color:#EFC52E;">&#9742;</td><td style="padding:0 0 4px 0;font-size:10px;color:#fff;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;line-height:1.5;">${p1}<br>${state.phone2}</td></tr>`;
  } else {
    phoneRows = `<tr><td style="padding:0 6px 4px 0;vertical-align:middle;font-size:11px;color:#EFC52E;">&#9742;</td><td style="padding:0 0 4px 0;font-size:10px;color:#fff;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;">${p1}</td></tr>`;
  }

  const mboxHTML = mboxes.map(m =>
    `<p style="margin:0 0 1px 0;font-size:9px;color:#fff;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;line-height:1.4;"><span style="color:#EFC52E;font-weight:bold;">${m.label}:</span> <a href="mailto:${m.email}" style="color:#fff;text-decoration:none;">${m.email}</a></p>`
  ).join('\n');

  let discl = 'Disclaimer: Keyrisk Group Benefits (Pty) Ltd accepts no liability for unauthorised use of its email facility or the contents of this communication.';
  if (state.includeFAIS && state.faisRole)
    discl += `<br>As ${state.faisRole}, I may provide factual product information only and am not authorised to give advice in terms of FAIS.`;

  return `<table cellpadding="0" cellspacing="0" border="0" width="580" style="width:580px;max-width:580px;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;border-collapse:collapse;">
  <tr><td style="background-color:#21243D;padding:0;">
    <table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">
      <tr>
        <td width="150" valign="top" style="width:150px;padding:16px 0 14px 18px;vertical-align:top;">

            <tr><td><img src="${HOSTED_LOGO}" width="140" height="46" alt="Keyrisk" style="display:block;width:140px;height:46px;"></td></tr>
            <tr><td style="padding-top:80px;"><p style="margin:0;font-size:8px;color:#8a8faa;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;letter-spacing:.5px;">FSP No. 50139</p></td></tr>

          <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
            <tr><td>
              <p style="margin:0;font-size:18px;font-weight:bold;color:#EFC52E;letter-spacing:3px;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;text-transform:uppercase;line-height:1.1;">${fn}</p>
              <p style="margin:0 0 3px 0;font-size:18px;font-weight:300;color:#8a8faa;letter-spacing:3px;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;text-transform:uppercase;line-height:1.1;">${ln}</p>
              <p style="margin:0 0 10px 0;font-size:10px;color:#fff;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;line-height:1.4;">${title}${regionLine}</p>
            </td></tr>
            ${mboxes.length ? `<tr><td>
              <p style="margin:0 0 3px 0;font-size:9px;font-weight:bold;color:#fff;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;letter-spacing:.5px;">${secTitle}</p>
              ${mboxHTML}
            </td></tr>` : ''}

        </td>
        <td width="195" valign="top" style="width:195px;padding:16px 18px 16px 6px;vertical-align:top;">
          <table cellpadding="0" cellspacing="0" border="0" style="border-collapse:collapse;">
            ${phoneRows}
            <tr><td style="padding:0 6px 4px 0;vertical-align:middle;font-size:11px;color:#EFC52E;">&#9993;</td><td style="padding:0 0 4px 0;font-size:10px;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;"><a href="mailto:${em}" style="color:#fff;text-decoration:none;">${em}</a></td></tr>
            <tr><td style="padding:0 6px 12px 0;vertical-align:middle;font-size:11px;color:#EFC52E;">&#8853;</td><td style="padding:0 0 12px 0;font-size:10px;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;"><a href="https://www.keyrisk.co.za" style="color:#fff;text-decoration:none;">www.keyrisk.co.za</a></td></tr>
            <tr><td colspan="2" style="font-size:9px;color:#fff;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;line-height:1.5;">Block A, Homestead Office Park,<br>65 Homestead Avenue, Bryanston<br>Private Bag X135, Bryanston, 2021<br><span style="font-weight:bold;">Tel:</span> +27 86 100 0079</td></tr>

      </tr>

    ${state.includeNote ? `<table cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse:collapse;">

    </table>` : ''}
  </td></tr>
  <tr><td style="padding:6px 18px;"><p style="margin:0;font-size:8px;color:#666;font-family:Trebuchet MS,Arial,Helvetica,sans-serif;line-height:1.4;">${discl}</p></td></tr>

}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = '<span class="icon">&#10003;</span> ' + msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}

function copyHTML() {
  navigator.clipboard.writeText(generateSignatureHTML()).then(() => showToast('HTML code copied to clipboard'));
}

function copySignature() {
  const html = generateSignatureHTML();
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  tmp.style.position = 'fixed';
  tmp.style.left = '-9999px';
  tmp.style.top = '0';
  tmp.style.opacity = '0';
  document.body.appendChild(tmp);
  const range = document.createRange();
  range.selectNodeContents(tmp);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  document.execCommand('copy');
  sel.removeAllRanges();
  document.body.removeChild(tmp);
  showToast('Signature copied — paste into your email client');
}

function applyPreset(name) {
  state.selectedMailboxes = [...PRESETS[name]];
  state.sectionHeading = (name === 'service') ? 'service' : 'dedicated';
  render();
}

function toggleMailbox(id) {
  const idx = state.selectedMailboxes.indexOf(id);
  if (idx >= 0) state.selectedMailboxes.splice(idx, 1);
  else state.selectedMailboxes.push(id);
  render();
}

function render() {
  const activePreset = getActivePreset();
  const mailboxCheckboxes = ALL_MAILBOXES.map(m => {
    const checked = state.selectedMailboxes.includes(m.id) ? 'checked' : '';
    return `<label class="mbox-item">
      <input type="checkbox" data-mbox="${m.id}" ${checked}>
      <div><span class="mbox-label">${m.label}</span><span class="mbox-email">${m.email}</span></div>
    </label>`;
  }).join('');

  app.innerHTML = `
    <div class="header">
      <div class="header-logo"><img src="${LOGO_SRC}" alt="Keyrisk"></div>
      <h1>Email Signature Generator</h1>
      <p>Generate branded email signatures for the Keyrisk team</p>
    </div>
    <div class="layout">
      <div class="form-panel">
        <h2>Employee Details</h2>
        <div class="field-row">
          <div class="field"><label>First Name</label><input type="text" id="firstName" placeholder="e.g. Breena" value="${state.firstName}"></div>
          <div class="field"><label>Last Name</label><input type="text" id="lastName" placeholder="e.g. Pereira" value="${state.lastName}"></div>
        </div>
        <div class="field"><label>Job Title</label><input type="text" id="title" placeholder="e.g. Claims Administrator" value="${state.title}"></div>
        <div class="field"><label>Region (optional)</label><input type="text" id="region" placeholder="e.g. Cape Region" value="${state.region}"></div>
        <div class="field-row">
          <div class="field"><label>Phone (Primary)</label><input type="text" id="phone1" placeholder="+27 XX XXX XXXX" value="${state.phone1}"></div>
          <div class="field"><label>Phone 2 / Ext (optional)</label><input type="text" id="phone2" placeholder="+27 10 040 2020 Ext. 109" value="${state.phone2}"></div>
        </div>
        <div class="field"><label>Email Address</label><input type="text" id="email" placeholder="Auto-generated or type custom" value="${state.email}"></div>
        <div class="section-divider"></div>
        <h2>Signature Links</h2>
        <label style="display:block;font-size:11px;font-weight:500;color:var(--label);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;">Section Heading</label>
        <div class="heading-toggle">
          <button class="heading-btn ${state.sectionHeading==='dedicated'?'active':''}" data-heading="dedicated">Dedicated Mailboxes</button>
          <button class="heading-btn ${state.sectionHeading==='service'?'active':''}" data-heading="service">Service Links</button>
        </div>
        <label style="display:block;font-size:11px;font-weight:500;color:var(--label);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;">Quick Presets</label>
        <div class="preset-row">
          <button class="preset-btn ${activePreset==='standard'?'active-preset':''}" data-preset="standard">Standard</button>
          <button class="preset-btn ${activePreset==='bryte'?'active-preset':''}" data-preset="bryte">Bryte</button>
          <button class="preset-btn ${activePreset==='service'?'active-preset':''}" data-preset="service">Service Links</button>
        </div>
        <label style="display:block;font-size:11px;font-weight:500;color:var(--label);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;">Select Links to Include</label>
        <div class="mbox-grid">${mailboxCheckboxes}</div>
        <div class="section-divider"></div>
        <h2>Additional Options</h2>
        <label class="checkbox-field">
          <input type="checkbox" id="includeNote" ${state.includeNote?'checked':''}>
          <span>Include "Please include fund name..." note</span>
        </label>
        <label class="checkbox-field">
          <input type="checkbox" id="includeFAIS" ${state.includeFAIS?'checked':''}>
          <span>Include FAIS disclaimer</span>
        </label>
        ${state.includeFAIS?`<div class="field"><label>FAIS Role Description</label><input type="text" id="faisRole" placeholder="e.g. Operations Manager" value="${state.faisRole}"></div>`:''}
      </div>
      <div class="preview-panel">
        <div class="preview-header">
          <h2>Live Preview</h2>
          <div class="btn-group">
            <button class="btn btn-secondary" onclick="copyHTML()">&#60;/&#62; Copy HTML</button>
            <button class="btn btn-primary" onclick="copySignature()">&#128203; Copy Signature</button>
          </div>
        </div>
        <div class="preview-body"><div id="sig-preview">${generateSignatureHTML()}</div></div>
      </div>
    </div>
    <div class="instructions">
      <h3>How to Use</h3>
      <ol>
        <li>Fill in the employee details — the preview updates live.</li>
        <li>Use a <strong style="color:var(--gold)">Quick Preset</strong> to auto-select a common link set, or manually tick individual links below.</li>
        <li>Choose the section heading: <code>Dedicated Mailboxes</code> or <code>Service Links</code>.</li>
        <li>Click <strong style="color:var(--gold)">"Copy Signature"</strong> to copy the formatted signature — paste directly into Outlook / Gmail signature settings.</li>
        <li>Click <strong style="color:var(--gold)">"Copy HTML"</strong> for raw HTML code.</li>
        <li>If the email address field is left blank, it auto-generates as <code>flastname@keyrisk.co.za</code>.</li>
      </ol>
    </div>`;

  ['firstName','lastName','title','region','phone1','phone2','email','faisRole'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener('input', e => {
      state[id] = e.target.value;
      document.getElementById('sig-preview').innerHTML = generateSignatureHTML();
    });
  });
  document.querySelectorAll('[data-mbox]').forEach(cb => { cb.addEventListener('change', () => toggleMailbox(cb.dataset.mbox)); });
  document.querySelectorAll('.heading-btn').forEach(b => { b.addEventListener('click', () => { state.sectionHeading = b.dataset.heading; render(); }); });
  document.querySelectorAll('.preset-btn').forEach(b => { b.addEventListener('click', () => applyPreset(b.dataset.preset)); });
  const noteEl = document.getElementById('includeNote');
  if (noteEl) noteEl.addEventListener('change', e => { state.includeNote = e.target.checked; render(); });
  const faisEl = document.getElementById('includeFAIS');
  if (faisEl) faisEl.addEventListener('change', e => { state.includeFAIS = e.target.checked; render(); });
}

render();
</script>
</body>
</html>
